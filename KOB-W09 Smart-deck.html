<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flip & Frame Companion for iPad (Neon Future Edition)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- Base Setup with Neon Pulse --- */
        @keyframes neon-pulse {
            0%, 100% {
                opacity: 1;
                text-shadow: 0 0 10px #00ff9f, 0 0 15px rgba(0, 255, 159, 0.6);
            }
            50% {
                opacity: 0.9;
                text-shadow: 0 0 8px #00ff9f, 0 0 12px rgba(0, 255, 159, 0.4);
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #020617;
            color: #f5f5f5;
            font-family: 'Urbanist', sans-serif;
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- Left Panel: Neon Dashboard --- */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            z-index: 10;
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 255, 159, 0.2);
        }

        .clock-wrapper {
            background-color: rgba(10, 10, 10, 0.9);
            padding: 24px 48px;
            border-radius: 20px;
            perspective: 1000px;
            margin-bottom: 35px;
            box-shadow: 0 0 30px rgba(0, 255, 159, 0.15), inset 0 0 15px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(0, 255, 159, 0.4);
        }

        .clock {
            font-size: 7.5rem;
            color: #00ff9f;
            font-weight: 700;
            letter-spacing: 4px;
            transform-style: preserve-3d;
            transition: transform 0.25s ease-in;
            display: inline-block;
            text-shadow: 0 0 10px #00ff9f, 0 0 15px rgba(0, 255, 159, 0.6); 
            animation: neon-pulse 2s infinite;
        }

        .clock.flip-out { transform: rotateX(90deg); filter: blur(2px); }
        .clock.flip-in { transform: rotateX(-90deg); transition: none; filter: blur(2px); }
        .clock.flip-in-active { transform: rotateX(0deg); transition: transform 0.25s ease-out; filter: blur(0); }

        .date {
            font-size: 2.3rem;
            letter-spacing: 3px;
            margin-bottom: 12px;
            font-weight: 400;
            color: #daffde;
            text-shadow: 0 0 8px rgba(218, 255, 222, 0.7);
        }

        .day {
            font-size: 1.9rem;
            color: #a7f3d0;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.8;
            text-shadow: 0 0 5px rgba(167, 243, 208, 0.6);
        }

        /* --- Right Panel: Frame & Hidden Panel Base --- */
        .right-panel {
            flex: 1;
            position: relative;
            background-color: #010409;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            cursor: pointer;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 1s ease-in-out;
            pointer-events: none;
            filter: saturate(1.1) contrast(1.1);
        }

        .placeholder-text {
            color: #a7f3d0;
            font-size: 1.2rem;
            text-align: center;
            padding: 2rem;
            line-height: 1.6;
            z-index: 5;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(167, 243, 208, 0.5);
        }

        .upload-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(10, 10, 10, 0.8);
            color: #00ff9f;
            border: 2px solid #00ff9f;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 159, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            text-shadow: 0 0 5px #00ff9f;
        }

        .upload-label:active {
            background-color: #00ff9f;
            color: #0a0a0a;
            transform: scale(0.95);
            box-shadow: 0 0 25px #00ff9f;
            text-shadow: none;
        }

        #file-input { display: none; }

        /* --- タイマーパネル (Neon Edition) --- */
        .timer-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: default;
            border-bottom: 2px solid rgba(0, 255, 159, 0.3);
        }

        .timer-panel.active {
            transform: translateY(0);
            box-shadow: 0 10px 50px rgba(0, 255, 159, 0.15);
        }

        .timer-display {
            font-size: 7rem;
            font-weight: 700;
            color: #00ff9f;
            letter-spacing: 5px;
            margin-bottom: 30px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 15px #00ff9f, 0 0 25px rgba(0, 255, 159, 0.5);
        }

        .timer-settings {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-group label {
            font-size: 1.1rem;
            color: #a7f3d0;
            margin-top: 8px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #a7f3d0;
        }

        .input-group input {
            width: 90px;
            height: 70px;
            background-color: rgba(10, 10, 10, 0.8);
            border: 2px solid rgba(0, 255, 159, 0.5);
            border-radius: 12px;
            color: #00ff9f;
            font-size: 2.5rem;
            font-family: 'Urbanist', sans-serif;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 0 15px rgba(0, 255, 159, 0.2);
            text-shadow: 0 0 10px #00ff9f;
        }

        .input-group input:focus {
            border-color: #00ff9f;
            box-shadow: 0 0 20px rgba(0, 255, 159, 0.4), inset 0 0 15px rgba(0, 255, 159, 0.4);
        }

        .timer-controls {
            display: flex;
            gap: 20px;
        }

        .timer-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Urbanist', sans-serif;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .timer-btn.primary {
            background-color: #00ff9f;
            color: #020617;
            border: none;
            box-shadow: 0 0 20px rgba(0, 255, 159, 0.6);
        }

        .timer-btn.primary:active {
            transform: scale(0.95);
            box-shadow: 0 0 35px #00ff9f;
        }

        .timer-btn.secondary {
            background-color: transparent;
            color: #00ff9f;
            border: 2px solid #00ff9f;
            text-shadow: 0 0 5px #00ff9f;
            box-shadow: 0 0 10px rgba(0, 255, 159, 0.2);
        }

        .timer-btn.secondary:active {
            background-color: rgba(0, 255, 159, 0.15);
            transform: scale(0.95);
        }

        .swipe-hint {
            position: absolute;
            bottom: 30px;
            font-size: 1rem;
            color: #a7f3d0;
            letter-spacing: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            text-shadow: 0 0 5px #a7f3d0;
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="clock-wrapper">
                <div id="clock" class="clock">00:00</div>
            </div>
            <div id="date" class="date">2026 / 05 / 18</div>
            <div id="day" class="day">Monday</div>
        </div>

        <div class="right-panel" id="right-panel">
            
            <div class="upload-container">
                <label for="file-input" class="upload-label">
                    <span>＋ Upload Neon Photos</span>
                </label>
                <input type="file" id="file-input" accept="image/*" multiple>
            </div>

            <div id="placeholder" class="placeholder-text">
                右上の「＋ Upload Neon Photos」から<br>写真を複数選択してください。<br><br>
                タップ：次の画像へ進む<br>
                下スワイプ：タイマーを開く
            </div>
            <img id="slide-base" class="slide" src="" alt="Slide Base" style="display: none;">
            <img id="slide-overlay" class="slide" src="" alt="Slide Overlay" style="opacity: 0; display: none;">

            <div class="timer-panel" id="timer-panel">
                <div class="timer-display" id="timer-display">00:00</div>
                
                <div class="timer-settings">
                    <div class="input-group">
                        <input type="number" id="timer-min" min="0" max="99" value="0" pattern="[0-9]*" inputmode="numeric">
                        <label>MIN</label>
                    </div>
                    <div class="input-group">
                        <input type="number" id="timer-sec" min="0" max="59" value="0" pattern="[0-9]*" inputmode="numeric">
                        <label>SEC</label>
                    </div>
                </div>

                <div class="timer-controls">
                    <button id="btn-timer-start" class="timer-btn primary">Start</button>
                    <button id="btn-timer-reset" class="timer-btn secondary">Reset</button>
                </div>

                <div class="swipe-hint">
                    <span>▲</span>
                    <span>Swipe UP to Photos</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        let uploadedImages = [];
        let currentImageIndex = 0;
        let slideShowIntervalId = null; 
        
        const baseImg = document.getElementById('slide-base');
        const overlayImg = document.getElementById('slide-overlay');
        const placeholderEl = document.getElementById('placeholder');
        const fileInput = document.getElementById('file-input');

        fileInput.addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length === 0) return;

            if (slideShowIntervalId) clearInterval(slideShowIntervalId);

            uploadedImages.forEach(url => URL.revokeObjectURL(url));
            uploadedImages = [];

            for (let i = 0; i < files.length; i++) {
                uploadedImages.push(URL.createObjectURL(files[i]));
            }

            placeholderEl.style.display = 'none';
            baseImg.style.display = 'block';
            overlayImg.style.display = 'block';

            currentImageIndex = 0;
            baseImg.src = uploadedImages[0];
            overlayImg.style.opacity = 0;

            if (uploadedImages.length > 1) {
                slideShowIntervalId = setInterval(changePictureAuto, 30000);
            }
        });

        function changePictureAuto() {
            if (uploadedImages.length <= 1) return;

            currentImageIndex = (currentImageIndex + 1) % uploadedImages.length;
            overlayImg.src = uploadedImages[currentImageIndex];
            overlayImg.style.opacity = 1;

            setTimeout(() => {
                baseImg.src = uploadedImages[currentImageIndex];
                overlayImg.style.opacity = 0;
            }, 1000);
        }

        function changePictureManual() {
            if (uploadedImages.length <= 1) return;
            
            changePictureAuto();

            if (slideShowIntervalId) {
                clearInterval(slideShowIntervalId);
                slideShowIntervalId = setInterval(changePictureAuto, 30000);
            }
        }

        const rightPanel = document.getElementById('right-panel');
        const timerPanel = document.getElementById('timer-panel');
        
        let startY = 0;
        let isPointerDown = false;
        let isDragging = false;

        rightPanel.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.upload-container') || 
                e.target.closest('.timer-settings') || 
                e.target.closest('.timer-controls')) {
                return;
            }
            if (e.button !== 0 && e.pointerType === 'mouse') return;
            
            startY = e.clientY;
            isPointerDown = true;
            isDragging = false;
        });

        rightPanel.addEventListener('pointermove', (e) => {
            if (!isPointerDown) return;
            isDragging = true;
        });

        rightPanel.addEventListener('pointerup', (e) => {
            if (!isPointerDown) return;
            isPointerDown = false;
            
            const endY = e.clientY;
            const deltaY = endY - startY;

            if (isDragging && Math.abs(deltaY) > 50) {
                if (deltaY > 0) {
                    timerPanel.classList.add('active');
                } else {
                    timerPanel.classList.remove('active');
                }
            } 
            else if (!isDragging || Math.abs(deltaY) < 10) {
                if (!timerPanel.classList.contains('active')) {
                    changePictureManual();
                }
            }
        });

        let timerId = null;
        let totalSeconds = 0;
        let targetTime = null; // 終了予定時刻を記録する変数を追加
        let isTimerRunning = false;
        
        const minInput = document.getElementById('timer-min');
        const secInput = document.getElementById('timer-sec');
        const timerDisplay = document.getElementById('timer-display');
        const startBtn = document.getElementById('btn-timer-start');
        const resetBtn = document.getElementById('btn-timer-reset');

        function updateTimerDisplay() {
            const displaySeconds = Math.max(0, totalSeconds);
            const m = Math.floor(displaySeconds / 60).toString().padStart(2, '0');
            const s = (displaySeconds % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }

        [minInput, secInput].forEach(input => {
            input.addEventListener('input', () => {
                if (!isTimerRunning) {
                    const m = parseInt(minInput.value) || 0;
                    const s = parseInt(secInput.value) || 0;
                    totalSeconds = (m * 60) + s;
                    updateTimerDisplay();
                }
            });
        });

        startBtn.addEventListener('click', () => {
            if (isTimerRunning) {
                // Pause時の処理
                clearInterval(timerId);
                isTimerRunning = false;
                startBtn.innerText = 'Start';
                
                // Pauseした瞬間の残り時間を正確に保持する
                const now = Date.now();
                const diff = targetTime - now;
                totalSeconds = diff > 0 ? Math.ceil(diff / 1000) : 0;
                updateTimerDisplay();
            } else {
                if (totalSeconds === 0) {
                    const m = parseInt(minInput.value) || 0;
                    const s = parseInt(secInput.value) || 0;
                    totalSeconds = (m * 60) + s;
                }
                
                if (totalSeconds > 0) {
                    isTimerRunning = true;
                    startBtn.innerText = 'Pause';
                    
                    // タイマー開始時に終了予定時刻(何日何時何秒何ミリ秒)を計算して記録
                    targetTime = Date.now() + (totalSeconds * 1000);
                    updateTimerDisplay(); 
                    
                    timerId = setInterval(() => {
                        // 毎回現在時刻と終了予定時刻の差分を計算
                        const now = Date.now();
                        const diff = targetTime - now;
                        
                        if (diff <= 0) {
                            totalSeconds = 0;
                            clearInterval(timerId);
                            isTimerRunning = false;
                            startBtn.innerText = 'Start';
                        } else {
                            // ミリ秒を秒に変換（切り上げで表示の違和感を防ぐ）
                            totalSeconds = Math.ceil(diff / 1000);
                        }
                        updateTimerDisplay();
                    }, 1000);
                }
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerId);
            isTimerRunning = false;
            startBtn.innerText = 'Start';
            const m = parseInt(minInput.value) || 0;
            const s = parseInt(secInput.value) || 0;
            totalSeconds = (m * 60) + s;
            updateTimerDisplay();
        });

        let currentDisplayedTime = "";
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const dayEl = document.getElementById('day');

        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const newTime = `${hours}:${minutes}`;

            if (newTime !== currentDisplayedTime) {
                if (currentDisplayedTime === "") {
                    clockEl.innerText = newTime;
                } else {
                    clockEl.classList.add('flip-out');
                    setTimeout(() => {
                        clockEl.innerText = newTime;
                        clockEl.classList.remove('flip-out');
                        clockEl.classList.add('flip-in');
                        void clockEl.offsetWidth; 
                        clockEl.classList.remove('flip-in');
                        clockEl.classList.add('flip-in-active');
                        setTimeout(() => clockEl.classList.remove('flip-in-active'), 250);
                    }, 250);
                }
                currentDisplayedTime = newTime;

                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const date = String(now.getDate()).padStart(2, '0');
                dateEl.innerText = `${year} / ${month} / ${date}`;

                const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                dayEl.innerText = days[now.getDay()];
            }
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
